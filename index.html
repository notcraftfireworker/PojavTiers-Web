<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PojavTiers Live Leaderboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: white; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #00ffcc; text-transform: uppercase; letter-spacing: 2px; }
        table { width: 95%; max-width: 900px; margin: 20px auto; border-collapse: collapse; background: #1a1a1a; border-radius: 8px; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        th, td { padding: 15px; border-bottom: 1px solid #333; text-align: left; }
        th { background: #333; color: #00ffcc; font-size: 14px; }
        tr:hover { background: #252525; }
        .rank-tag { background: #00ffcc; color: black; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .gamemode { color: #aaa; font-style: italic; }
        #loading { font-size: 18px; color: #888; }
    </style>
</head>
<body>

    <h1>🏆 PojavTiers Rankings</h1>
    <p>Live API Data from Vercel</p>
    
    <div id="loading">Fetching latest tests...</div>

    <table id="tierTable" style="display:none;">
        <thead>
            <tr>
                <th>PLAYER</th>
                <th>RANK EARNED</th>
                <th>GAMEMODE</th>
                <th>REGION</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
    async function fetchTiers() {
        // Hum 2-3 alag tareekon se try karenge taaki kisi bhi tarah data load ho jaye
        const apiUrl = 'https://tierlist-bot.vercel.app/api/pojavtiers?v=' + Date.now();
        const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(apiUrl);

        try {
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error('Proxy error');
            
            const result = await response.json();
            // AllOrigins data ko string mein deta hai, humein use convert karna hoga
            const data = typeof result.contents === 'string' ? JSON.parse(result.contents) : result.contents;

            if (!Array.isArray(data)) {
                throw new Error('Data is not a list');
            }

            const tableBody = document.getElementById('tableBody');
            const table = document.getElementById('tierTable');
            const loading = document.getElementById('loading');

            tableBody.innerHTML = ''; 

            // Data ko reverse kar rahe hain taaki naye results upar dikhen
            data.reverse().forEach(player => {
                const row = `<tr>
                    <td><strong>${player.username || 'N/A'}</strong></td>
                    <td><span class="rank-tag">${player.rankEarned || 'No Rank'}</span></td>
                    <td class="gamemode">${player.gamemode || 'PvP'}</td>
                    <td>${player.region || 'Asia'}</td>
                </tr>`;
                tableBody.innerHTML += row;
            });

            loading.style.display = 'none';
            table.style.display = 'table';
            console.log("Data loaded successfully!");

        } catch (error) {
            console.error("Loading failed:", error);
            document.getElementById('loading').innerHTML = 
                `Data Load Nahi Ho Raha. <br><br> 
                <button onclick="location.reload()" style="padding:10px; background:#00ffcc; border:none; cursor:pointer;">Refresh Page</button>`;
        }
    }

    // Pehli baar load karein
    fetchTiers();
    // Har 60 seconds mein auto-refresh
    setInterval(fetchTiers, 60000);
</script>
</body>
</html>
